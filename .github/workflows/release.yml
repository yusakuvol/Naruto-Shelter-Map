name: Release

on:
  push:
    tags:
      - 'v*.*.*' # v1.0.0, v0.1.0 などの形式

permissions:
  contents: write # リリース作成に必要

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 全履歴を取得（リリースノート生成のため）
          ref: ${{ github.ref }} # タグが指すコミットをチェックアウト

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          if [[ ! "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "❌ Invalid tag format: ${{ github.ref }}"
            echo "   Expected format: refs/tags/v*.*.*"
            exit 1
          fi
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Verify version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "📋 Checking version match..."
          echo "   package.json: $PACKAGE_VERSION"
          echo "   Git tag: $TAG_VERSION"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   package.json: $PACKAGE_VERSION"
            echo "   Git tag: $TAG_VERSION"
            exit 1
          fi
          echo "✅ Version matches: $PACKAGE_VERSION"

      - name: Generate release title
        id: title
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            SUBTITLE="初回リリース"
          else
            SUBJECTS=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:'%s' --no-merges | grep -v -E '^[0-9]+\.[0-9]+\.[0-9]+ |^chore\(release\)|bump version' || true)
            PARTS=$(echo "$SUBJECTS" | sed -E 's/^(feat|fix|docs|perf|refactor)(\([^)]*\))?: *//' | head -3)
            SUBTITLE=$(echo "$PARTS" | tr '\n' '・' | sed 's/・$//' | cut -c1-48)
            if [ -z "$SUBTITLE" ] || [ "$SUBTITLE" = "・" ]; then
              SUBTITLE="メンテナンス更新"
            fi
          fi
          echo "title=v${TAG_VERSION} - ${SUBTITLE}" >> $GITHUB_OUTPUT
          echo "📌 Release title: v${TAG_VERSION} - ${SUBTITLE}"

      - name: Generate release notes
        id: release_notes
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # 初回リリース
            NOTES="$(cat <<EOF
          ## 🎉 初回リリース v${TAG_VERSION}
          
          ### 主な機能
          - 📍 避難所の位置表示
          - 🌐 オンライン/オフライン対応
          - 📶 完全オフライン動作（Service Worker）
          - 🔍 避難所検索
          - 📱 PWA対応
          - ♿ アクセシビリティ対応
          
          ### 技術スタック
          - Next.js 16
          - React 19
          - MapLibre GL JS 5.13
          - Tailwind CSS v4
          - TypeScript 5.6
          EOF
          )"
          else
            # 変更履歴を生成
            PREVIOUS_TAG_SHORT=${PREVIOUS_TAG#v}
            NOTES="$(cat <<EOF
          ## 📦 リリース v${TAG_VERSION}
          
          ### 変更内容
          
          \`\`\`
          $(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:'- %s (%h)' --no-merges)
          \`\`\`
          
          ### 完全な変更履歴
          [Compare ${PREVIOUS_TAG}...v${TAG_VERSION}](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${TAG_VERSION})
          EOF
          )"
          fi
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.title.outputs.title }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output release URL
        run: |
          echo "✅ Release created successfully!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

