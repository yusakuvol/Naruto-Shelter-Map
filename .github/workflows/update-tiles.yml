name: Update Map Tiles

on:
  # 毎月2日 3:00 JST (1日 18:00 UTC)
  schedule:
    - cron: "0 18 1 * *"
  # 手動実行を許可
  workflow_dispatch:
    inputs:
      maxzoom:
        description: "Max zoom level for the extract (default: 15)"
        required: false
        type: string

jobs:
  update-tiles:
    name: Update Map Tiles
    runs-on: ubuntu-latest
    permissions:
      contents: write # コミット・プッシュに必要
      pull-requests: write # PR作成に必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate PMTiles from latest Protomaps build
        env:
          TILES_MAXZOOM: ${{ inputs.maxzoom || '15' }}
        run: |
          echo "🗺️ Protomaps の最新ビルドから対象地域のタイルを生成します"
          pnpm generate:tiles

      - name: Check for changes
        id: git-check
        run: |
          if git diff --exit-code --quiet public/map/basemap.pmtiles; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ タイルに変更はありません"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            SIZE=$(du -h public/map/basemap.pmtiles | cut -f1)
            echo "size=$SIZE" >> $GITHUB_OUTPUT
            echo "✅ タイルに変更があります (${SIZE})"
          fi

      # create-pull-request アクションは「未コミットの作業ツリー変更」から
      # コミット・ブランチ・PRを作成する設計のため、手動の commit/push は行わない
      - name: Create or update Pull Request
        if: steps.git-check.outputs.changed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: public/map/basemap.pmtiles
          commit-message: |
            chore(data): Update bundled map tiles from Protomaps

            Updated offline basemap (PMTiles) using automated workflow.
            Source: Protomaps daily build (OpenStreetMap)

            🤖 Generated by GitHub Actions
          branch: data/tiles-auto-update
          base: main
          title: "chore(data): Update bundled map tiles from Protomaps"
          body: |
            ## 🗺️ 同梱地図タイル自動更新

            このPRは、Protomaps の最新ビルド（OpenStreetMap 由来）から生成した
            対象5市町（鳴門市・藍住町・北島町・松茂町・板野町）のオフライン用
            地図タイル（PMTiles）を反映します。

            - ファイル: `public/map/basemap.pmtiles`（${{ steps.git-check.outputs.size }}）
            - 生成スクリプト: `scripts/generate-map-tiles.ts`

            ### 自動マージ
            このPRはワークフローにより自動的にマージされます。
            （必須ステータスチェックがある場合は、チェック成功後にマージされます）

            🤖 Generated by GitHub Actions
          labels: |
            automated
            data-update
          delete-branch: true

      # PR作成のサイレント故障を防ぐ: 変更があるのにPRができていなければ失敗させる
      - name: Verify PR was created
        if: steps.git-check.outputs.changed == 'true'
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          OPERATION="${{ steps.create-pr.outputs.pull-request-operation }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "❌ タイルに変更があるのにPRが作成されませんでした"
            exit 1
          fi
          echo "✅ PR #${PR_NUMBER} (operation: ${OPERATION})"
          echo "🔗 ${{ steps.create-pr.outputs.pull-request-url }}"

      - name: Auto-merge Pull Request
        if: steps.git-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          # 必須ステータスチェックがある場合は auto-merge を予約する。
          # auto-merge が使えない場合（必須チェックなし・リポジトリ設定で無効）は直接マージする。
          if gh pr merge "$PR_NUMBER" --auto --squash --delete-branch; then
            echo "✅ auto-merge を有効化しました（チェック成功後にマージされます）"
          else
            echo "ℹ️ auto-merge を有効化できないため直接マージします"
            sleep 10
            gh pr merge "$PR_NUMBER" --squash --delete-branch
            echo "✅ PR #${PR_NUMBER} をマージしました"
          fi

      - name: Create summary
        if: always()
        run: |
          echo "## 🗺️ Map Tiles Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.git-check.outputs.changed }}" == "true" ]; then
            echo "✅ **Status**: Tiles updated (${{ steps.git-check.outputs.size }})" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
              echo "🔗 **PR**: ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ **Status**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          echo "📅 **Checked**: $(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
