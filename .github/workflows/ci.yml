name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ワークフロー全体の権限設定
permissions:
  contents: read
  pull-requests: read

jobs:
  # lint / type-check / test / build を同一ジョブで実行（CI リソース削減）
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm type-check

      - name: Test (with coverage check)
        run: pnpm test:coverage:check

      - name: Build
        run: pnpm build

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build output directory 'dist' not found!"
            exit 1
          fi
          echo "✅ Build output directory 'dist' found"
          ls -la dist/ | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # E2E テスト（ビルド成果物を使って Playwright で実行）
  e2e:
    name: E2E Test
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist/

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
