name: Lighthouse CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json

      - name: Format Lighthouse score
        id: format
        uses: actions/github-script@v8
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            const summary = results[0].summary;

            const score = (v) => v != null ? Math.round(v * 100) : 'N/A';
            const emoji = (v) => v == null ? '⚪' : v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';

            const categories = [
              ['Performance', summary.performance],
              ['Accessibility', summary.accessibility],
              ['Best Practices', summary['best-practices']],
              ['SEO', summary.seo],
            ];

            const rows = categories
              .map(([name, val]) => `| ${emoji(val)} ${name} | ${score(val)} |`)
              .join('\n');

            const body = `## ⚡ Lighthouse Report\n\n| Category | Score |\n|----------|-------|\n${rows}\n\n[Full Report](${results[0].url})`;

            core.setOutput('comment', body);

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: lighthouse
          message: ${{ steps.format.outputs.comment }}
